<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- css -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>

  <!--bootstrap-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="icon" href="{{ url_for('static', filename='favicon.ico.png') }}" type="image/x-icon">
  <title>{% block title %}Clinic{% endblock %}</title>

  {% block head %}{% endblock %}
</head>
<body>

  {% block navbar %}
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('views.home') }}">Dr. Stellah Kerongo</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('views.home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('views.aboutus') }}">About</a></li>
          <li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('views.booking') }}">Booking</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>

          <li class="nav-item ms-lg-2">
            <button class="btn btn-primary btn-sm px-3" data-bs-toggle="modal" data-bs-target="#bookingModal">
              Book Appointment
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  {% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='psychologist-site.js') }}"></script>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });
  </script>

  {% block script %}{% endblock %}
</body>
</html>
